name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: localtaskhub
          MYSQL_DATABASE: local-task-hub
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -plocaltaskhub"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: localtaskhub
      DB_NAME: local-task-hub
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Wait for MySQL service
      run: |
        for i in {1..30}; do
          if mysqladmin ping -h 127.0.0.1 -uroot -plocaltaskhub --silent; then
            exit 0
          fi
          sleep 2
        done
        echo "MySQL did not become ready in time"
        exit 1
    - name: Apply DB schema
      run: mysql -h 127.0.0.1 -uroot -plocaltaskhub local-task-hub < .docker/db_schema.sql
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test --project=chromium
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
